# =============================================================================
# Alephant — ClickHouse 部署配置
# =============================================================================
# Chart: weconomy/clickhouse-cluster (内部 Chart, 基于 Altinity Operator)
# 依赖: 需提前安装 Altinity ClickHouse Operator
# 用法:
#   helm upgrade --install alephant-clickhouse weconomy/clickhouse-cluster \
#     --version 0.1.1 \
#     --namespace alephant-prod \
#     --create-namespace \
#     -f middlewares/clickhouse.values.yaml
# =============================================================================

nameOverride: ch

clickhouse:
  clusterName: main
  image:
    repository: clickhouse/clickhouse-server
    tag: "24.8"
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 2Gi
  persistence:
    storageClassName: alicloud-disk-essd    # ← 按你的集群存储类修改
    size: 50Gi

layout:
  shardsCount: 1
  replicasCount: 2

keeper:
  enabled: true
  replicas: 3
  image:
    repository: clickhouse/clickhouse-keeper
    tag: "24.8-alpine"
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    storageClassName: alicloud-disk-essd    # ← 按你的集群存储类修改
    size: 20Gi

# 用户密码 — 部署前务必修改
users:
  "default/password": "CHANGE_ME"           # ← 务必替换
  "default/profile": default
  "default/quota": default
  "default/networks/ip":
    - "10.0.0.0/8"                         # ← 按集群 Pod CIDR 调整
    - "::1"
    - "127.0.0.1"

pdbMaxUnavailable: 1
